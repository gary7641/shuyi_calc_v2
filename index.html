<!--
  數易命盤計算器 (ShuYi Calculator)
  Version: 2.0.0
  Date: 2026-04-22
  Author: gary7641
  Structure:
    index.html        - HTML主結構
    css/theme.css     - 顏色/字體變數
    css/layout.css    - 版面佈局/響應式
    css/components.css - 元件樣式
    js/calc.js        - 計算核心邏輯
    js/data.js        - 81組解說/本源夢想資料
    js/render.js      - 畫面渲染
    js/export.js      - PDF匯出/分享
-->
<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>數易命盤計算器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <!-- 祥雲背景裝飾 -->
  <div class="cloud-bg"></div>

  <div class="container">

    <!-- Header -->
    <header class="site-header">
      <div class="cloud-deco left"></div>
      <h1>數易命盤</h1>
      <p class="subtitle">國學數易生命密碼</p>
      <div class="cloud-deco right"></div>
    </header>

    <!-- 輸入區 -->
    <section class="input-section" id="inputSection">
      <form id="birthForm">
        <div class="form-row">
          <div class="form-group">
            <label for="birthYear">出生年份</label>
            <input type="number" id="birthYear" placeholder="例: 1990" min="1900" max="2100" required>
          </div>
          <div class="form-group">
            <label for="birthMonth">出生月份</label>
            <select id="birthMonth" required>
              <option value="">選擇月份</option>
              <option value="1">1月</option>
              <option value="2">2月</option>
              <option value="3">3月</option>
              <option value="4">4月</option>
              <option value="5">5月</option>
              <option value="6">6月</option>
              <option value="7">7月</option>
              <option value="8">8月</option>
              <option value="9">9月</option>
              <option value="10">10月</option>
              <option value="11">11月</option>
              <option value="12">12月</option>
            </select>
          </div>
          <div class="form-group">
            <label for="birthDay">出生日期</label>
            <input type="number" id="birthDay" placeholder="例: 15" min="1" max="31" required>
          </div>
          <div class="form-group">
            <label for="ziTime">子時調整</label>
            <select id="ziTime">
              <option value="none">不調整</option>
              <option value="early">早子時 (前0-1時)</option>
              <option value="late">晚子時 (後23-24時)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="twin">孖胎</label>
            <select id="twin">
              <option value="none">否</option>
              <option value="elder">大孖</option>
              <option value="younger">細孖</option>
            </select>
          </div>
        </div>
        <button type="button" class="btn calculate" onclick="performCalculation()">✦ 起盤 ✦</button>      </form>
    </section>

    <!-- 結果區 -->
    <div class="results hidden" id="results">

      <!-- 頂部 Tab 導航 -->
      <nav class="tab-nav" id="tabNav">
        <button class="tab-btn active" data-mode="birth">本命盤</button>
        <button class="tab-btn" data-mode="year">流年</button>
        <button class="tab-btn" data-mode="month">流月</button>
        <button class="tab-btn" data-mode="day">流日</button>
      </nav>

      <!-- 結果標題 -->
      <div class="result-title" id="resultTitle"></div>

      <!-- Section 1: 基本資料 -->
      <section class="result-section" id="sectionProfile">
        <div class="section-header">
          <span class="section-icon">☯</span>
          <h2>基本資料</h2>
        </div>
        <!-- 核心資料卡片 -->
        <div class="profile-cards" id="profileCards"></div>
        <!-- 六大範疇 -->
        <div class="life-aspects" id="lifeAspects"></div>
        <!-- 特別注意 -->
        <div class="special-notes" id="specialNotes"></div>
      </section>

      <!-- 祥雲分隔線 -->
      <div class="cloud-divider"><span>❧</span></div>

      <!-- Section 2: 命盤圖 -->
      <section class="result-section" id="sectionChart">
        <div class="section-header">
          <span class="section-icon">◈</span>
          <h2>命盤圖</h2>
        </div>
        <div class="chart-wrapper">
          <!-- 倒三角命盤 -->
          <div class="triangle-chart" id="triangleChart"></div>
          <!-- 五行分佈 -->
          <div class="elements-bar" id="elementsBar"></div>
        </div>
      </section>

      <!-- 祥雲分隔線 -->
      <div class="cloud-divider"><span>❧</span></div>

      <!-- Section 3: 13組聯合碼 -->
      <section class="result-section" id="sectionGroups">
        <div class="section-header">
          <span class="section-icon">⚇</span>
          <h2>十三組聯合碼</h2>
        </div>
        <div class="groups-container" id="groupsContainer"></div>
      </section>

      <!-- 祥雲分隔線 -->
      <div class="cloud-divider"><span>❧</span></div>

      <!-- Section 4: 操作按鈕 -->
      <section class="action-section">
        <button class="action-btn" onclick="exportPDF()">📄 匯出 PDF</button>
        <button class="action-btn" onclick="shareLink()">🔗 分享連結</button>
        <button class="action-btn" onclick="showInput()">✎ 重新輸入</button>
      </section>

    </div>
    <!-- end results -->

  </div>
  <!-- end container -->

  <!-- 手機底部導航 -->
  <nav class="bottom-nav" id="bottomNav">
    <button onclick="scrollToSection('sectionProfile')">👤 基本</button>
    <button onclick="scrollToSection('sectionChart')">◈ 命盤</button>
    <button onclick="scrollToSection('sectionGroups')">⚇ 聯合碼</button>
    <button onclick="exportPDF()">📄 PDF</button>
  </nav>

  <script src="js/data.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/render.js"></script>
  <script src="js/export.js"></script>

</body>
</html>
